        </div>

        <script>
            function Fibonacci() {
                let n = document.getElementById("fibonacci-limit").value;
                for (let a = 0, b = 1, c = a + b; a < n; c = (a = b) + (b = c)) {
                    document.getElementById("fibonacci-sequence").innerHTML += `${a}\t`;
                }
            }
        </script>

        <script>
            function Degree() {
                let input_number = document.getElementById("input-number");
                let degree_number = document.getElementById("degree-number");
                let n = input_number.value;
                let s = degree_number.value;
                let result = 1;

                for (let i = 1; i <= s; i++) {
                    result *= n;
                    document.getElementById("degree-result").innerHTML += `${n}^${i} = ${result};<br>`;
                }
                document.getElementById("degree-result").innerHTML += `<h3>${n}^${s} = ${result};</h3>`;
            }
        </script>
